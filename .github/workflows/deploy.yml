name: Deploy Quarto Site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Cache R packages
      uses: actions/cache@v4
      with:
        path: ${{ env.R_LIBS_USER }}
        key: ${{ runner.os }}-r-pkgs-${{ hashFiles('.github/workflows/deploy.yml') }}
        restore-keys: |
          ${{ runner.os }}-r-pkgs-

    - name: Install R packages
      run: |
        Rscript -e 'install.packages(
          c("tidyverse", "tidyRSS", "lubridate", "httr2",
            "rvest", "stringr", "xml2", "gt"),
          repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"
        )'

    - name: Render Quarto site
      run: quarto render

    - name: Verify news page rendered
      run: test -f docs/content/news/index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
